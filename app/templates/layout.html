<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-50 text-slate-900">
    <div class="min-h-screen">
      <header class="bg-slate-900 text-white shadow-sm">
        <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
          <div class="text-lg font-semibold">Secure Platform</div>
          <nav class="flex gap-4 text-sm">
            <a href="/" class="hover:text-slate-200">Home</a>
            <a href="/admin" class="hover:text-slate-200">Admin</a>
            <a href="/auth/login" class="hover:text-slate-200">Login</a>
          </nav>
        </div>
      </header>
      <main class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
