{% extends "layout.html" %}

{% block content %}
<h1>Reset Password</h1>
<p>Enter your email address to receive a password reset link.</p>
<form method="post" novalidate>
    {{ form.hidden_tag() }}
    <div>
        {{ form.email.label }}
        {{ form.email(size=32) }}
        {{ form.email.errors[0] if form.email.errors }}
    </div>
    <div>
        {{ form.submit() }}
    </div>
</form>
<p><a href="{{ url_for('auth.login') }}">Back to login</a></p>
{% endblock %}
