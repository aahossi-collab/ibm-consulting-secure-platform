name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: Lint (flake8 + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install lint tools
        run: pip install flake8 black

      - name: Run flake8
        run: flake8 app --max-line-length=120 --exclude=migrations

      - name: Run black (check only)
        run: black --check app --exclude=migrations

  tests:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Debug environment
        run: |
          pwd
          ls -la
          python --version
          python -c "import os; print(os.getcwd())"
          python -c "import sys; print(sys.path)"
          python -c "import app; print(app.__file__)"

      - name: Run tests
        env:
          FLASK_ENV: testing
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m pytest tests -v --cov=app --cov-report=term-missing

  security:
    name: Security scan (bandit + pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install security tools
        run: pip install bandit pip-audit

      - name: Run bandit (static analysis)
        run: bandit -r app -ll -x app/migrations

      - name: Run pip-audit (vulnerable dependencies)
        continue-on-error: true
        run: |
          pip install -r requirements.txt
          pip-audit -r requirements.txt